# Host ports 17474 / 17687 avoid clash when another runtime (e.g. OrbStack) binds 7474/7687.
services:
  neo4j:
    image: neo4j:5.18-community
    container_name: openclaw-neo4j
    ports:
      - "17474:7474"  # HTTP (browser UI)
      - "17687:7687"  # Bolt — use in NEO4J_URI=bolt://127.0.0.1:17687
    environment:
      - NEO4J_AUTH=neo4j/openclaw
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
