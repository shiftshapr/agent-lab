<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bride of Charlie — file editor</title>
  <style>
    :root { color-scheme: dark; --bg: #0f172a; --fg: #e2e8f0; --accent: #38bdf8; --err: #f87171; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--fg); min-height: 100vh; }
    header { padding: 0.75rem 1rem; border-bottom: 1px solid #334155; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    header code { color: var(--accent); font-size: 0.85rem; }
    #path { flex: 1; min-width: 12rem; opacity: 0.85; }
    #msg { font-size: 0.85rem; }
    #msg.err { color: var(--err); }
    #msg.ok { color: #4ade80; }
    main { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; height: calc(100vh - 3.5rem); box-sizing: border-box; }
    textarea {
      flex: 1; width: 100%; box-sizing: border-box; resize: none;
      background: #020617; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; padding: 0.75rem;
      font-family: ui-monospace, monospace; font-size: 0.8rem; line-height: 1.4;
    }
    button {
      background: #1e293b; color: var(--fg); border: 1px solid #475569; border-radius: 6px;
      padding: 0.4rem 0.85rem; cursor: pointer; font-size: 0.9rem;
    }
    button:hover { background: #334155; }
    button.primary { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <strong>Bride of Charlie</strong>
    <code id="fid"></code>
    <span id="path"></span>
    <button type="button" class="primary" id="save">Save</button>
    <button type="button" id="reload">Reload</button>
    <span id="msg"></span>
  </header>
  <main>
    <textarea id="editor" spellcheck="false" aria-label="File content"></textarea>
  </main>
  <script>
    const FILE_ID = "__FILE_ID__";
    const fidEl = document.getElementById("fid");
    const pathEl = document.getElementById("path");
    const editor = document.getElementById("editor");
    const msg = document.getElementById("msg");
    let etag = null;

    fidEl.textContent = FILE_ID;

    function setMsg(text, cls) {
      msg.textContent = text || "";
      msg.className = cls || "";
    }

    async function loadFile() {
      setMsg("Loading…", "");
      try {
        const r = await fetch("/api/bride/hub/file/" + encodeURIComponent(FILE_ID), {
          credentials: "same-origin",
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j.error || r.statusText);
        }
        etag = r.headers.get("ETag");
        const data = await r.json();
        pathEl.textContent = data.path || "";
        editor.value = data.content ?? "";
        setMsg("Loaded.", "ok");
      } catch (e) {
        editor.value = "";
        setMsg(String(e.message || e), "err");
      }
    }

    async function saveFile() {
      if (!etag) {
        setMsg("Load the file before saving.", "err");
        return;
      }
      setMsg("Saving…", "");
      try {
        const r = await fetch("/api/bride/hub/file/" + encodeURIComponent(FILE_ID), {
          method: "PUT",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "If-Match": etag,
          },
          body: JSON.stringify({ content: editor.value }),
        });
        const j = await r.json().catch(() => ({}));
        if (r.status === 412) {
          setMsg("Conflict — file changed elsewhere. Reload.", "err");
          return;
        }
        if (!r.ok) throw new Error(j.error || r.statusText);
        etag = r.headers.get("ETag") || etag;
        setMsg("Saved.", "ok");
      } catch (e) {
        setMsg(String(e.message || e), "err");
      }
    }

    document.getElementById("save").addEventListener("click", saveFile);
    document.getElementById("reload").addEventListener("click", loadFile);
    loadFile();
  </script>
</body>
</html>
